<script>
// ============================================================
//  DATA LAYER
// ============================================================
const STORAGE_KEYS = { transactions: 'ledgerly_transactions', settings: 'ledgerly_settings', tags: 'ledgerly_tags' };
function getTags() { try { const t = JSON.parse(localStorage.getItem(STORAGE_KEYS.tags)); return Array.isArray(t) ? t : []; } catch { return []; } }
function saveTags(tags) { localStorage.setItem(STORAGE_KEYS.tags, JSON.stringify(tags)); }

function getTransactions() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEYS.transactions)) || []; }
  catch { return []; }
}
function saveTransactions(txs) { localStorage.setItem(STORAGE_KEYS.transactions, JSON.stringify(txs)); }

function getSettings() {
  const defaults = { name:'', year: new Date().getFullYear(), businessType:'design', expenseMethod:'simple_ratio', customExpenseRatio:0.641, dependents:0, taxToggles: { pension: true, health: true, longTermCare: true } };
  try { return { ...defaults, ...JSON.parse(localStorage.getItem(STORAGE_KEYS.settings)) }; }
  catch { return defaults; }
}
function saveSettings(s) { localStorage.setItem(STORAGE_KEYS.settings, JSON.stringify(s)); }

function addTransaction(tx) {
  const txs = getTransactions();
  tx.id = crypto.randomUUID();
  txs.unshift(tx);
  saveTransactions(txs);
  return tx;
}
function deleteTransaction(id) {
  saveTransactions(getTransactions().filter(t => t.id !== id));
}
function uuid() { return crypto.randomUUID(); }

// ============================================================
//  TAX ENGINE (2024 Korean Freelancer)
// ============================================================
const TAX_BRACKETS = [
  { limit: 14000000, rate: 0.06, deduction: 0 },
  { limit: 50000000, rate: 0.15, deduction: 1260000 },
  { limit: 88000000, rate: 0.24, deduction: 5760000 },
  { limit: 150000000, rate: 0.35, deduction: 15440000 },
  { limit: 300000000, rate: 0.38, deduction: 19940000 },
  { limit: 500000000, rate: 0.40, deduction: 25940000 },
  { limit: 1000000000, rate: 0.42, deduction: 35940000 },
  { limit: Infinity, rate: 0.45, deduction: 65940000 },
];

const EXPENSE_RATIOS = {
  design: { label: 'IT/디자인/개발', ratio: 0.641 },
  writer: { label: '작가/강사', ratio: 0.606 },
  consulting: { label: '컨설팅', ratio: 0.641 },
  other: { label: '기타 서비스', ratio: 0.526 },
};

function calcProgressiveTax(taxable) {
  if (taxable <= 0) return 0;
  for (const b of TAX_BRACKETS) {
    if (taxable <= b.limit) return Math.max(0, taxable * b.rate - b.deduction);
  }
  return 0;
}

function getEffectiveBracket(taxable) {
  for (const b of TAX_BRACKETS) {
    if (taxable <= b.limit) return b;
  }
  return TAX_BRACKETS[TAX_BRACKETS.length - 1];
}

function calculateTax(grossIncome, expenses, withheldTax, settings) {
  const expenseRatio = EXPENSE_RATIOS[settings.businessType]?.ratio || settings.customExpenseRatio || 0.641;
  const expenseAmount = settings.expenseMethod === 'simple_ratio'
    ? grossIncome * expenseRatio
    : expenses;

  const businessIncome = Math.max(0, grossIncome - expenseAmount);
  const basicDeduction = 1500000 * (1 + (settings.dependents || 0));
  const taxableIncome = Math.max(0, businessIncome - basicDeduction);

  const incomeTax = calcProgressiveTax(taxableIncome);
  const localTax = Math.round(incomeTax * 0.1);
  const tg = settings.taxToggles || {};
  const pension = tg.pension !== false ? Math.min(Math.round(businessIncome * 0.09), 6372000) : 0;
  const healthIns = tg.health !== false ? Math.round(businessIncome * 0.0709) : 0;
  const ltci = tg.longTermCare !== false ? Math.round(healthIns * 0.1281) : 0;

  const totalSocialIns = pension + healthIns + ltci;
  const totalTax = Math.round(incomeTax) + localTax + totalSocialIns;
  const withheld = withheldTax;
  const additionalTax = Math.round(incomeTax) + localTax - withheld;

  const effectiveRate = grossIncome > 0 ? ((totalTax / grossIncome) * 100) : 0;

  return {
    grossIncome, expenseAmount: Math.round(expenseAmount), expenseRatio,
    businessIncome, basicDeduction, taxableIncome,
    incomeTax: Math.round(incomeTax), localTax, pension, healthIns, ltci,
    totalSocialIns, totalTax, withheld, additionalTax,
    netIncome: grossIncome - totalTax,
    effectiveRate: effectiveRate.toFixed(1),
    bracket: getEffectiveBracket(taxableIncome)
  };
}

// ============================================================
//  HELPERS
// ============================================================
function fmt(n) { return new Intl.NumberFormat('ko-KR').format(Math.round(n)); }
function fmtW(n) { return '₩' + fmt(n); }
function fmtDate(d) {
  const dt = new Date(d);
  return `${dt.getFullYear()}. ${dt.getMonth()+1}. ${dt.getDate()}.`;
}
function fmtDateShort(d) {
  if (!d) return '';
  const dt = new Date(d);
  return `${dt.getFullYear()}.${String(dt.getMonth()+1).padStart(2,'0')}.${String(dt.getDate()).padStart(2,'0')}`;
}
function fmtWorkPeriod(t) {
  if (t.workStart) return t.workEnd ? `${fmtDateShort(t.workStart)} ~ ${fmtDateShort(t.workEnd)}` : fmtDateShort(t.workStart);
  return fmtDate(t.date);
}
function getTaxType(t) {
  if (t.taxType) return t.taxType;
  if (t.unreported) return 'unreported';
  if (t.withholding) return 'withholding_3.3';
  return 'none';
}
function getPaymentStatus(t) { return t.paymentStatus || 'confirmed'; }
function taxBadge(taxType) {
  const map = { none: ['없음','#acadad','#fff'], withholding_3_3: ['3.3%','#005da7','#eef3ff'], withholding_1_65: ['1.65%','#4f5d67','#e7f5ff'], unreported: ['세금미신고','#b31b25','#ffefee'], exception: ['예외','#757777','#fff'] };
  const key = (taxType||'none').replace(/\./g,'_');
  const [label, bg, color] = map[key] || map['none'];
  return `<span class="tx-badge" style="background:${bg};color:${color}">${label}</span>`;
}
function statusBadge(status) {
  const map = { confirmed: ['확인완료','#525e55','#e9f6ea'], unconfirmed: ['미확인','#b31b25','#ffefee'], pending: ['미확정','#acadad','#fff'] };
  const [label, bg, color] = map[status] || map['confirmed'];
  return `<span class="tx-badge" style="background:${bg};color:${color}">${label}</span>`;
}
function fmtDateKo(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return `${dt.getFullYear()}년 ${dt.getMonth()+1}월 ${dt.getDate()}일`;
}

const datePicker = {
  year: 0, month: 0, targetId: null,
  pickerMode: null, // null | 'year' | 'month'
  pickerYearBase: 0,
  show(targetId, anchor) {
    this.targetId = targetId;
    this.pickerMode = null;
    const val = document.getElementById(targetId)?.value;
    const d = val ? new Date(val + 'T00:00:00') : new Date();
    this.year = d.getFullYear(); this.month = d.getMonth();
    this.render();
    const el = document.getElementById('custom-calendar');
    el.classList.remove('hidden');
    const rect = anchor.getBoundingClientRect();
    const calW = 280, calH = 360;
    let left = rect.left;
    if (left + calW > window.innerWidth - 8) left = window.innerWidth - calW - 8;
    const spaceBelow = window.innerHeight - rect.bottom;
    const top = spaceBelow >= calH || spaceBelow >= rect.top ? rect.bottom + 6 : rect.top - calH - 6;
    el.style.left = Math.max(8, left) + 'px';
    el.style.top = top + 'px';
  },
  hide() { document.getElementById('custom-calendar').classList.add('hidden'); this.pickerMode = null; },
  prevMonth() { this.month--; if (this.month < 0) { this.month = 11; this.year--; } this.render(); },
  nextMonth() { this.month++; if (this.month > 11) { this.month = 0; this.year++; } this.render(); },
  prevUnit() {
    if (this.pickerMode === 'year') { this.pickerYearBase -= 8; this.renderPicker(); }
    else if (this.pickerMode === 'month') { this.year--; this.renderPicker(); }
    else { this.prevMonth(); }
  },
  nextUnit() {
    if (this.pickerMode === 'year') { this.pickerYearBase += 8; this.renderPicker(); }
    else if (this.pickerMode === 'month') { this.year++; this.renderPicker(); }
    else { this.nextMonth(); }
  },
  togglePicker() {
    if (this.pickerMode === null) {
      this.pickerMode = 'year';
      this.pickerYearBase = this.year;
      this.renderPicker();
    } else {
      this.pickerMode = null;
      document.getElementById('cal-picker-panel').classList.add('hidden');
      document.getElementById('cal-normal-view').classList.remove('hidden');
      this.render();
    }
  },
  renderPicker() {
    document.getElementById('cal-picker-panel').classList.remove('hidden');
    document.getElementById('cal-normal-view').classList.add('hidden');
    const grid = document.getElementById('cal-picker-grid');
    grid.innerHTML = '';
    if (this.pickerMode === 'year') {
      document.getElementById('cal-month-label').textContent = '연도 선택';
      for (let y = this.pickerYearBase - 4; y <= this.pickerYearBase + 3; y++) {
        const btn = document.createElement('button');
        btn.type = 'button'; btn.textContent = `${y}년`;
        const isSel = y === this.year;
        btn.className = 'text-sm py-2 px-1 rounded-lg transition-colors ' + (isSel ? 'bg-primary text-on-primary font-bold' : 'hover:bg-surface-container text-on-surface');
        btn.onclick = () => { this.year = y; this.pickerMode = 'month'; this.renderPicker(); };
        grid.appendChild(btn);
      }
    } else if (this.pickerMode === 'month') {
      document.getElementById('cal-month-label').textContent = `${this.year}년`;
      ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'].forEach((name, i) => {
        const btn = document.createElement('button');
        btn.type = 'button'; btn.textContent = name;
        const isSel = i === this.month;
        btn.className = 'text-sm py-2 px-1 rounded-lg transition-colors ' + (isSel ? 'bg-primary text-on-primary font-bold' : 'hover:bg-surface-container text-on-surface');
        btn.onclick = () => {
          this.month = i; this.pickerMode = null;
          document.getElementById('cal-picker-panel').classList.add('hidden');
          document.getElementById('cal-normal-view').classList.remove('hidden');
          this.render();
        };
        grid.appendChild(btn);
      });
    }
  },
  setVal(val) {
    const input = document.getElementById(this.targetId);
    if (input) input.value = val;
    const trigger = document.querySelector(`[data-cal="${this.targetId}"]`);
    if (trigger) {
      const disp = trigger.querySelector('.cal-display');
      if (disp) { disp.textContent = val ? fmtDateKo(val) : (this.targetId === 'tx-work-end' ? '종료일 (선택)' : '시작일 선택'); disp.classList.toggle('text-on-surface-variant', !val); disp.classList.toggle('text-on-surface', !!val); }
    }
  },
  select(day) {
    const d = new Date(this.year, this.month, day);
    const val = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    this.setVal(val); this.hide();
  },
  clear() { this.setVal(''); this.hide(); },
  today() { const t = new Date(); this.year = t.getFullYear(); this.month = t.getMonth(); this.render(); this.select(t.getDate()); },
  render() {
    this.pickerMode = null;
    document.getElementById('cal-picker-panel')?.classList.add('hidden');
    document.getElementById('cal-normal-view')?.classList.remove('hidden');
    document.getElementById('cal-month-label').textContent = `${this.year}년 ${this.month+1}월`;
    const today = new Date();
    const selVal = document.getElementById(this.targetId)?.value;
    const sel = selVal ? new Date(selVal + 'T00:00:00') : null;
    const firstDay = new Date(this.year, this.month, 1).getDay();
    const daysInMonth = new Date(this.year, this.month+1, 0).getDate();
    const daysInPrev = new Date(this.year, this.month, 0).getDate();
    const grid = document.getElementById('cal-grid');
    grid.innerHTML = '';
    const mkBtn = (label, classes, onClick) => {
      const b = document.createElement('button');
      b.type = 'button'; b.textContent = label; b.className = 'cal-day ' + classes;
      if (onClick) b.onclick = onClick;
      return b;
    };
    for (let i = firstDay - 1; i >= 0; i--) grid.appendChild(mkBtn(daysInPrev - i, 'cal-day-other'));
    for (let d = 1; d <= daysInMonth; d++) {
      const dow = new Date(this.year, this.month, d).getDay();
      const isToday = today.getFullYear()===this.year && today.getMonth()===this.month && today.getDate()===d;
      const isSel = sel && sel.getFullYear()===this.year && sel.getMonth()===this.month && sel.getDate()===d;
      let cls = isSel ? 'cal-day-selected' : isToday ? 'cal-day-today' : '';
      const btn = mkBtn(d, cls, () => this.select(d));
      if (!isSel) { if (dow===0) btn.style.color='#b31b25'; else if (dow===6) btn.style.color='#4f5d67'; }
      grid.appendChild(btn);
    }
    const total = Math.ceil((firstDay + daysInMonth) / 7) * 7;
    for (let n = 1; n <= total - firstDay - daysInMonth; n++) grid.appendChild(mkBtn(n, 'cal-day-other'));
  }
};
document.addEventListener('click', e => {
  const cal = document.getElementById('custom-calendar');
  if (cal && !cal.classList.contains('hidden') && !cal.contains(e.target) && !e.target.closest('.cal-trigger')) datePicker.hide();

function calcWithheldTax(txs) {
  return txs.filter(t=>t.type==='income').reduce((s,t) => {
    const tt = getTaxType(t);
    if (tt==='withholding_3.3') return s + Math.round(t.amount*0.033);
    if (tt==='withholding_1.65') return s + Math.round(t.amount*0.0165);
    return s;
  }, 0);
}
function calcReportableIncome(txs) {
  return txs.filter(t => {
    if (t.type !== 'income') return false;
    const tt = getTaxType(t);
    return tt !== 'unreported' && tt !== 'exception';
  }).reduce((s,t) => s+t.amount, 0);
}
function calcTotalIncome(txs) {
  return txs.filter(t => t.type === 'income').reduce((s,t) => s + t.amount, 0);
}
function calcTotalActualIncome(txs) {
  return txs.filter(t => t.type === 'income').reduce((s,t) => s + (t.actualAmount || t.amount), 0);
}
function getMonthName(m) { return ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'][m]; }

function getYearTransactions(year) {
  return getTransactions().filter(t => new Date(t.date).getFullYear() === year);
}
function getMonthTransactions(year, month) {
  return getTransactions().filter(t => {
    const d = new Date(t.date);
    return d.getFullYear() === year && d.getMonth() === month;
  });
}

  const monthIncome = monthTxs.filter(t=>t.type==='income').reduce((s,t)=>s+(t.actualAmount||t.amount), 0);
  const yearTotalIncome = calcTotalIncome(yearTxs);

  const yearExpense = yearTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount, 0);
  const withheldTax = calcWithheldTax(yearTxs);

  const tax = calculateTax(yearReportable, yearExpense, withheldTax, settings);

            <div class="absolute inset-0 flex items-center justify-end gap-1 opacity-0 group-hover:opacity-100 transition-opacity duration-150">
              <button onclick="openEditTransaction('${t.id}')" class="p-1.5 hover:bg-primary/10 rounded-full text-primary transition-colors">

            </div>
          </div>
        </div>`;}).join('')}</div>`}
    </section>
  `;
}

function setReportYearFilter(y) { reportYearFilter = y; renderView('reports'); }

function confirmDelete(id) {
  showConfirm('이 거래를 삭제하시겠습니까?', () => {
    deleteTransaction(id);
    renderView(currentView);
  });
}

function openEditTransaction(id) {
  const tx = getTransactions().find(t => t.id === id);
  if (!tx) return;
  editingTxId = id;
  _pendingEditTags = tx.tags || [];
  openAddTransaction();
  // Patch title
  const h3 = document.querySelector('#modal-content h3');
  if (h3) h3.textContent = '거래 수정';
  // Patch type
  const typeEl = document.getElementById('tx-type');
  if (typeEl) { typeEl.value = tx.type; typeEl.dispatchEvent(new Event('change')); }
  // Patch dates
  const patchCal = (hidId, val) => {
    const hid = document.getElementById(hidId);
    if (!hid) return;
    hid.value = val || '';
    const disp = document.querySelector(`[data-cal="${hidId}"] .cal-display`);
    if (disp && val) {
      disp.textContent = fmtDateKo(val);
      disp.classList.remove('text-on-surface-variant');
      disp.classList.add('text-on-surface');
    }
  };
  patchCal('tx-date', tx.date);
  patchCal('tx-work-start', tx.workStart);
  patchCal('tx-work-end', tx.workEnd);
  // Text fields
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
  set('tx-project', tx.project || tx.description);
  set('tx-client', tx.client);
  set('tx-notes', tx.notes);
  // Amount fields
  const fmtAmt = v => (v !== undefined && v !== null) ? new Intl.NumberFormat('ko-KR').format(v) : '';
  const amtEl = document.getElementById('tx-amount');
  if (amtEl) amtEl.value = fmtAmt(tx.amount);
  const actEl = document.getElementById('tx-actual');
  if (actEl) actEl.value = tx.actualAmount ? fmtAmt(tx.actualAmount) : '';
  // Expense-specific fields
  set('tx-expense-category', tx.expenseCategory);
  set('tx-payment-method', tx.paymentMethod);
  set('tx-proof-url', tx.proofUrl);
  // Tax type pill
  const tt = getTaxType(tx);
  const taxGroup = document.getElementById('tax-type-group');
  if (taxGroup) {
    taxGroup.querySelectorAll('.pill-opt').forEach(b => b.classList.remove('sel-blue','sel-green','sel-warn','sel-gray'));
    const tb = taxGroup.querySelector(`[data-value="${tt}"]`);
    if (tb) tb.classList.add(tt === 'none' || tt === 'exception' ? 'sel-gray' : 'sel-blue');
  }
  // Payment status pill
  const ps = getPaymentStatus(tx);
  const psGroup = document.getElementById('payment-status-group');
  if (psGroup) {
    psGroup.querySelectorAll('.pill-opt').forEach(b => b.classList.remove('sel-blue','sel-green','sel-warn','sel-gray'));
    const pb = psGroup.querySelector(`[data-value="${ps}"]`);
    if (pb) pb.classList.add(ps === 'confirmed' ? 'sel-green' : ps === 'unconfirmed' ? 'sel-warn' : 'sel-gray');
  }
}

function exportCSV() {
  const txs = getYearTransactions(reportYearFilter);
  if (txs.length === 0) { showToast('내보낼 거래 내역이 없습니다.', 'error'); return; }

  const header = '날짜,유형,설명,클라이언트,금액,원천징수여부,원천징수액';
  const rows = txs.map(t => {
    const wh = t.withholding ? Math.round(t.amount * 0.033) : 0;
    return `${t.date},${t.type==='income'?'수입':'지출'},"${(t.description||'').replace(/"/g,'""')}","${(t.client||'').replace(/"/g,'""')}",${t.amount},${t.withholding?'Y':'N'},${wh}`;
  });
  const csv = [header, ...rows].join('\n');

  if (window.electronAPI) {
    window.electronAPI.saveCSV(csv).then(ok => { if (ok) showToast('CSV 파일이 저장되었습니다.', 'success'); });
  } else {
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `ledgerly_${reportYearFilter}.csv`;
    a.click();
  }
}

function importCSV() {
  async function doImport(csvText) {
    if (!csvText) return;
    const lines = csvText.replace(/^\uFEFF/, '').split('\n').filter(l => l.trim());
    if (lines.length < 2) { showToast('CSV 파일에 데이터가 없습니다.', 'error'); return; }
    // Parse header
    const header = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
    const dateIdx = header.findIndex(h => /날짜|date|결제일/i.test(h));
    const typeIdx = header.findIndex(h => /유형|type/i.test(h));
    const descIdx = header.findIndex(h => /설명|프로젝트|구매.*항목|description/i.test(h));
    const clientIdx = header.findIndex(h => /클라이언트|거래처|구매처|client/i.test(h));
    const amountIdx = header.findIndex(h => /금액|amount|결제/i.test(h));
    if (dateIdx === -1 || amountIdx === -1) { showToast('날짜, 금액 열을 찾을 수 없습니다.', 'error'); return; }
    let count = 0;
    for (let i = 1; i < lines.length; i++) {
      const cols = [];
      let cur = '', inQuote = false;
      for (const ch of lines[i]) {
        if (ch === '"') { inQuote = !inQuote; }
        else if (ch === ',' && !inQuote) { cols.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      cols.push(cur.trim());
      const rawAmt = (cols[amountIdx]||'').replace(/[^0-9]/g, '');
      const amount = parseInt(rawAmt) || 0;
      const typeVal = typeIdx >= 0 ? cols[typeIdx] : '';
      const type = /지출|expense/i.test(typeVal) ? 'expense' : 'income';
      const date = (cols[dateIdx]||'').replace(/\./g, '-').replace(/(\d{4})-(\d{1,2})-(\d{1,2}).*/, (_, y, m, d) => `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`);
      if (!date) continue;
      addTransaction({
        date, type, amount, actualAmount: amount,
        project: descIdx >= 0 ? cols[descIdx]||'' : '',
        description: descIdx >= 0 ? cols[descIdx]||'' : '',
        client: clientIdx >= 0 ? cols[clientIdx]||'' : '',
        workStart: '', workEnd: '', taxType: 'none', withholding: false, unreported: false,
        paymentStatus: 'confirmed', notes: 'CSV 가져오기', tags: [], category: 'general'
      });
      count++;
    }
    showToast(`${count}건의 거래를 가져왔습니다.`, 'success');
    renderView(currentView);
  }
  if (window.electronAPI?.openCSV) {
    window.electronAPI.openCSV().then(doImport);
  } else {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.csv';
    input.onchange = () => { const f = input.files[0]; if (!f) return; const r = new FileReader(); r.onload = () => doImport(r.result); r.readAsText(f, 'utf-8'); };
    input.click();
  }
}

function openModal(html) {
  const content = document.getElementById('modal-content');
  content.innerHTML = html;
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.getElementById('modal-overlay').classList.add('flex');
  const fadeTop = document.getElementById('modal-fade-top');
  const fadeBot = document.getElementById('modal-fade-bot');
  function updateFades() {
    if (!fadeTop || !fadeBot) return;
    fadeTop.style.opacity = content.scrollTop > 8 ? '1' : '0';
    fadeBot.style.opacity = content.scrollHeight - content.scrollTop - content.clientHeight > 8 ? '1' : '0';
  }
  content.addEventListener('scroll', updateFades);
  requestAnimationFrame(updateFades);
}
function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  document.getElementById('modal-overlay').classList.remove('flex');
  editingTxId = null;
}

// ── Toast ──────────────────────────────────────────────
function showToast(message, type = 'info') {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  const styles = {
    success: 'background:#525e55;color:#e9f6ea',
    error:   'background:#b31b25;color:#ffefee',
    info:    'background:#2d2f2f;color:#f6f6f6'
  };
  toast.style.cssText = `${styles[type]||styles.info};padding:10px 20px;border-radius:9999px;font-size:0.8rem;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,0.18);pointer-events:auto;white-space:nowrap;`;
  toast.className = 'toast-item';
  toast.textContent = message;
  container.appendChild(toast);
  setTimeout(() => { toast.style.transition = 'opacity 0.3s'; toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2800);
}

// ── Confirm dialog ─────────────────────────────────────
let _confirmCb = null;
function showConfirm(message, onConfirm, { okLabel = '삭제', okDanger = true } = {}) {
  _confirmCb = onConfirm;
  document.getElementById('confirm-message').textContent = message;
  const okBtn = document.getElementById('confirm-ok-btn');
  okBtn.textContent = okLabel;
  okBtn.style.background = okDanger ? '#b31b25' : '#005da7';
  okBtn.style.color = okDanger ? '#ffefee' : '#eef3ff';
  const d = document.getElementById('confirm-dialog');
  d.classList.remove('hidden'); d.classList.add('flex');
}
function _closeConfirm() {
  document.getElementById('confirm-dialog').classList.add('hidden');
  document.getElementById('confirm-dialog').classList.remove('flex');
  _confirmCb = null;
}
document.getElementById('confirm-ok-btn').addEventListener('click', () => { const cb = _confirmCb; _closeConfirm(); if (cb) cb(); });
document.getElementById('confirm-cancel-btn').addEventListener('click', _closeConfirm);
let _modalMouseDownTarget = null;
document.getElementById('modal-overlay').addEventListener('mousedown', e => { _modalMouseDownTarget = e.target; });
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay') && _modalMouseDownTarget === document.getElementById('modal-overlay')) closeModal();
});

    return amt;
  }
  function updateActualField() {
    if (actualManuallyEdited) return;
    const taxType = document.querySelector('#tax-type-group .pill-opt.sel-blue, #tax-type-group .pill-opt.sel-gray')?.dataset.value || 'none';

    const el = document.getElementById('tx-actual');
    el.value = actual > 0 ? new Intl.NumberFormat('ko-KR').format(actual) : '';
  }
  document.getElementById('tx-actual').addEventListener('input', () => { actualManuallyEdited = true; });
  document.getElementById('tx-amount').addEventListener('input', updateActualField);

  // Pill group helper
  function initPillGroup(groupId, defaultValue) {
    const group = document.getElementById(groupId);
    group.querySelectorAll('.pill-opt').forEach(btn => {
      if (btn.dataset.value === defaultValue) {
        btn.classList.add(btn.dataset.selClass || (groupId === 'tax-type-group' ? 'sel-gray' : 'sel-green'));
      }
      btn.addEventListener('click', () => {
        group.querySelectorAll('.pill-opt').forEach(b => b.classList.remove('sel-blue','sel-green','sel-warn','sel-gray'));
        const cls = groupId === 'payment-status-group'
          ? (btn.dataset.value === 'confirmed' ? 'sel-green' : btn.dataset.value === 'unconfirmed' ? 'sel-warn' : 'sel-gray')
          : (btn.dataset.value === 'none' ? 'sel-gray' : btn.dataset.value === 'exception' ? 'sel-gray' : 'sel-blue');
        btn.classList.add(cls);
        if (groupId === 'tax-type-group') updateActualField();
      });
    });
  }
  initPillGroup('tax-type-group', 'none');
  initPillGroup('payment-status-group', 'confirmed');

  // Tag system
  let selectedTags = [];
  if (_pendingEditTags !== null) { selectedTags = [..._pendingEditTags]; _pendingEditTags = null; }
  let dragSrcIdx = null;
  function renderTagList() {
    const allTags = getTags();
    const container = document.getElementById('tx-tag-list');
    container.innerHTML = '';
    allTags.forEach((tag, i) => {
      const wrap = document.createElement('div');
      const isSel = selectedTags.includes(tag);
      wrap.className = 'pill-opt relative flex items-center gap-1 cursor-pointer select-none' + (isSel ? ' sel-blue' : '');
      wrap.style.paddingRight = '20px';
      wrap.draggable = true;
      // label (click to toggle selection)
      const label = document.createElement('span');
      label.textContent = tag;
      label.onclick = () => {
        isSel ? selectedTags.splice(selectedTags.indexOf(tag), 1) : selectedTags.push(tag);
        renderTagList();
      };
      // delete × button
      const del = document.createElement('span');
      del.textContent = '×';
      del.title = '태그 삭제';
      del.style.cssText = 'position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:11px;line-height:1;cursor:pointer;opacity:0.5;transition:opacity 0.15s;';
      del.onmouseenter = () => { del.style.opacity = '1'; };
      del.onmouseleave = () => { del.style.opacity = '0.5'; };
      del.onclick = (e) => {
        e.stopPropagation();
        const tags = getTags();
        tags.splice(tags.indexOf(tag), 1);
        saveTags(tags);
        selectedTags = selectedTags.filter(t => t !== tag);
        renderTagList();
      };
      // drag events
      wrap.addEventListener('dragstart', (e) => { dragSrcIdx = i; e.dataTransfer.effectAllowed = 'move'; setTimeout(() => { wrap.style.opacity = '0.4'; }, 0); });
      wrap.addEventListener('dragend', () => { wrap.style.opacity = '1'; dragSrcIdx = null; });
      wrap.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; wrap.style.outline = '2px solid #005da7'; wrap.style.outlineOffset = '2px'; });
      wrap.addEventListener('dragleave', () => { wrap.style.outline = ''; wrap.style.outlineOffset = ''; });
      wrap.addEventListener('drop', (e) => {
        e.preventDefault(); wrap.style.outline = ''; wrap.style.outlineOffset = '';
        if (dragSrcIdx === null || dragSrcIdx === i) return;
        const tags = getTags();
        const [moved] = tags.splice(dragSrcIdx, 1);
        tags.splice(i, 0, moved);
        saveTags(tags);
        dragSrcIdx = null;
        renderTagList();
      });
      wrap.appendChild(label);
      wrap.appendChild(del);
      container.appendChild(wrap);
    });
  }
  renderTagList();
  function addNewTag() {
    const input = document.getElementById('tx-new-tag');
    const val = input.value.trim();
    if (!val) return;
    const tags = getTags();
    if (!tags.includes(val)) { tags.push(val); saveTags(tags); }
    if (!selectedTags.includes(val)) selectedTags.push(val);
    input.value = '';
    renderTagList();
  }
  document.getElementById('tx-new-tag').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addNewTag(); } });
  document.getElementById('tx-add-tag-btn').addEventListener('click', addNewTag);

  function applyTypeMode(type) {
    const isExpense = type === 'expense';
    document.getElementById('income-fields').style.display = isExpense ? 'none' : 'block';
    document.getElementById('expense-fields').style.display = isExpense ? 'block' : 'none';
    document.getElementById('work-period-section').style.display = isExpense ? 'none' : 'block';
    document.getElementById('actual-amount-section').style.display = isExpense ? 'none' : 'block';
    document.getElementById('date-label').textContent = isExpense ? '결제일' : '날짜 (입금일)';
    document.getElementById('project-label').textContent = isExpense ? '구매 항목' : '프로젝트명';
    document.getElementById('client-label').textContent = isExpense ? '구매처 (출처)' : '클라이언트 / 거래처';
    document.getElementById('amount-label').textContent = isExpense ? '결제 금액 (원)' : '세전 금액 (원)';
    document.getElementById('tx-project').placeholder = isExpense ? '예: Adobe 구독, 노트북' : '프로젝트명';
    document.getElementById('tx-client').placeholder = isExpense ? '예: https://example.com' : '예: ABC 스튜디오';
  }
  document.getElementById('tx-type').addEventListener('change', e => applyTypeMode(e.target.value));

  document.getElementById('add-tx-form').addEventListener('submit', e => {
    e.preventDefault();
    const rawAmount = document.getElementById('tx-amount').value.replace(/[^0-9]/g, '');
    const amount = rawAmount === '' ? null : parseInt(rawAmount);
    if (amount === null || isNaN(amount) || amount < 0) { showToast('금액을 입력해주세요.', 'error'); return; }
    const txTypeVal = document.getElementById('tx-type').value;
    const workStart = document.getElementById('tx-work-start').value;
    if (txTypeVal === 'income' && !workStart) { showToast('작업 시작일을 입력해주세요.', 'error'); return; }
    const rawActual = document.getElementById('tx-actual').value.replace(/[^0-9]/g, '');
    const actualAmount = parseInt(rawActual) || 0;
    const taxType = document.querySelector('#tax-type-group .pill-opt.sel-blue, #tax-type-group .pill-opt.sel-gray')?.dataset.value || 'none';
    const paymentStatus = document.querySelector('#payment-status-group .pill-opt.sel-green, #payment-status-group .pill-opt.sel-warn, #payment-status-group .pill-opt.sel-gray')?.dataset.value || 'confirmed';
    const project = document.getElementById('tx-project').value.trim();

    const txData = {
      date: document.getElementById('tx-date').value,
      workStart: txTypeVal === 'income' ? workStart : '',
      workEnd: txTypeVal === 'income' ? (document.getElementById('tx-work-end').value || '') : '',
      type: txTypeVal,
      amount,
      actualAmount: txTypeVal === 'income' ? actualAmount : amount,
      project,
      description: project,
      client: document.getElementById('tx-client').value.trim(),
      taxType: txTypeVal === 'income' ? taxType : 'none',
      withholding: txTypeVal === 'income' && taxType === 'withholding_3.3',
      unreported: txTypeVal === 'income' && taxType === 'unreported',
      paymentStatus: txTypeVal === 'income' ? paymentStatus : 'confirmed',
      expenseCategory: document.getElementById('tx-expense-category')?.value.trim() || '',
      paymentMethod: document.getElementById('tx-payment-method')?.value.trim() || '',
      proofUrl: document.getElementById('tx-proof-url')?.value.trim() || '',
      notes: document.getElementById('tx-notes').value.trim(),
      tags: [...selectedTags],
      category: 'general'
    };
    if (editingTxId) {
      const txs = getTransactions();
      const idx = txs.findIndex(t => t.id === editingTxId);
      if (idx !== -1) { txs[idx] = { ...txs[idx], ...txData }; saveTransactions(txs); }
      editingTxId = null;
    } else {
      addTransaction(txData);
    }
    closeModal();
    renderView(currentView);
  });
}

function formatAmountInput(el) {
  const raw = el.value.replace(/[^0-9]/g, '');
  if (raw) {
    el.value = new Intl.NumberFormat('ko-KR').format(parseInt(raw));
  }
}

    <form id="settings-form" class="space-y-5">
      <div>

      </div>
      <div class="grid grid-cols-2 gap-4">

          <label class="text-label-md text-on-surface-variant block mb-1.5">귀속연도</label>

        </select>
      </div>
      <div id="custom-ratio-row" style="display:${s.businessType==='custom'?'block':'none'}">
        <label class="text-label-md text-on-surface-variant block mb-1.5">경비율 (%)</label>
        <input type="number" id="set-custom-ratio" value="${((s.customExpenseRatio||0.641)*100).toFixed(1)}" min="0" max="100" step="0.1" class="w-full bg-surface-container-low rounded-lg px-4 py-3 text-sm border-none focus:ring-2 focus:ring-primary/30" placeholder="0 ~ 100"/>
      </div>
      <div>
        <label class="text-label-md text-on-surface-variant block mb-1.5">경비 처리 방식</label>
        <select id="set-expense-method" class="w-full bg-surface-container-low rounded-lg px-4 py-3 text-sm border-none focus:ring-2 focus:ring-primary/30">
          <option value="simple_ratio" ${s.expenseMethod==='simple_ratio'?'selected':''}>단순경비율 (자동 계산)</option>
          <option value="actual" ${s.expenseMethod==='actual'?'selected':''}>실제 경비 (직접 입력한 지출 합산)</option>
        </select>
      </div>
      <div class="bg-tertiary-container/20 rounded-lg p-4">
        <p class="text-xs text-on-surface-variant flex items-start gap-2">
          <span class="material-symbols-outlined text-tertiary text-base mt-0.5">info</span>
          <span><strong>단순경비율</strong>: 국세청이 정한 업종별 경비 비율로 자동 계산합니다. 연 수입 3,600만원 이하 프리랜서에게 적용됩니다.<br/><strong>실제 경비</strong>: 직접 입력한 지출 내역을 경비로 사용합니다.</span>
        </p>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="button" onclick="closeModal()" class="flex-1 py-3 rounded-full bg-surface-container text-on-surface-variant font-semibold text-sm hover:bg-surface-container-high transition-colors">취소</button>
        <button type="submit" class="flex-1 py-3 rounded-full bg-primary text-on-primary font-semibold text-sm hover:scale-[1.02] transition-transform shadow-md shadow-primary/20">저장</button>
      </div>
    </form>
  `);

  document.getElementById('settings-form').addEventListener('submit', e => {
    e.preventDefault();
    const bt = document.getElementById('set-business').value;
    const customRatioInput = parseFloat(document.getElementById('set-custom-ratio').value) / 100;
    saveSettings({
      name: document.getElementById('set-name').value.trim(),
      year: parseInt(document.getElementById('set-year').value),
      businessType: bt,
      expenseMethod: document.getElementById('set-expense-method').value,
      customExpenseRatio: bt === 'custom' ? (isNaN(customRatioInput) ? 0.641 : Math.min(Math.max(customRatioInput, 0), 1)) : (EXPENSE_RATIOS[bt]?.ratio || 0.641),
      dependents: parseInt(document.getElementById('set-dependents').value) || 0,
      taxToggles: getSettings().taxToggles || { pension: true, health: true, longTermCare: true }
    });
    closeModal();
    navigate(currentView);
  });
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
